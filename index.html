<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Horak INC</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/semantic-ui@2.5.0/dist/semantic.min.css">
  </head>
  <style>
    .back {
      background-image: url(images/KarooWindmill_CharlesJohnstone.webp);
      background-repeat: no-repeat;
      background-attachment: fixed;
      background-size: cover;
      border-radius: .28571429rem;
    }
    .semi-transparent-bg {
      background-color: rgba(255, 255, 255, 60%); /* Alternative modern syntax */
      border-radius: .28571429rem;
    }
  </style>
  <body>
    <div class="ui grid container"> 
    
    <!-- logo image -->
    
      <div class="ui row">
        <div class="ui column">
          <div class="ui container">
            <img class="ui centered image" src="images/logo.jpg">
          </div>
        </div>
      </div>
    
    <!-- navigation bar -->
    
      <div class="ui row">
        <div class="ui column">
          <div class="ui container">
            <div class="ui red inverted six item stackable menu">
              <a class="item active">Home</a>
              <a class="item">Services</a>
              <a class="item">Team</a>
              <a class="item">Contact Us</a>
              <a class="item">Horak Realty</a>
              <a class="item">Privacy Policy</a>
            </div>
          </div>
        </div>
      </div>
    
    <!-- Image with content and transperant card -->
    
      <div class="ui row" style="min-height: 95vh;">
        <div class="ui column">
          <div class="ui back" style="min-height: 95vh;">
            <div class="ui two column stackable grid container">
              <div class="right floated column">
                <div class="ui container">
                  <div class="semi-transparent-bg">
                    <div class="ui basic segment">
                      <h1 class="ui header">Attorneys</h1>
                      <h1 class="ui header">Notaries</h1>
                      <h1 class="ui header">Conveyancers</h1>
                      <button class="ui inverted secondary button">Learn more</button>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div> 
      <div class="row">

      </div>     
    </div>

    <div class="ui fluid container">
        <div class="ui grid">
          <div class="red row">
            <div class="column">
              <div class="ui basic segment">
                <h1 class="ui inverted header">Contacts</h1>
                <p class="content">Tel:</p>
                <!-- <a href="tel:+27664755851">hello</a> -->
              </div>
            </div>
          </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/semantic-ui@2.5.0/dist/semantic.min.js"></script>
  </body>
</html>
